baseURL = 'https://example.org/'
languageCode = 'en-US'
title = 'Kaapi Theme'
theme = 'kaapi'

[params]
  description = 'A minimal, responsive Hugo theme with modern features and beautiful design'
  author = 'Your Name'
  themeName = 'Kaapi Theme'

  # Social links (optional - uncomment and fill in to use)
  # [params.social]
  #   github = 'yourusername'
  #   twitter = 'yourusername'
  #   linkedin = 'yourusername'
  #   email = 'your@email.com'
  #   rss = '/index.xml'

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = false
  [markup.highlight]
    style = 'monokai'
    lineNos = true
    lineNumbersInTable = true
    noClasses = false

[menus]
  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 10

  [[menus.main]]
    name = 'Posts'
    pageRef = '/posts'
    weight = 20

  [[menus.main]]
    name = 'Tags'
    pageRef = '/tags'
    weight = 30

[module]
  [module.hugoVersion]
    extended = false
    min = '0.146.0'
